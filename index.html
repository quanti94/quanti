<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Österreichisch Lernen</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--red:#c0392b;--red2:#e74c3c;--white:#faf9f6;--cream:#f0ede6;--dark:#1a1208;--mid:#3d2b1a;--gold:#c9972a;--gold2:#f0c040;--green:#27ae60;--shadow:0 8px 32px rgba(0,0,0,0.18)}
html,body{min-height:100vh;background:var(--cream);font-family:'DM Sans',sans-serif;color:var(--dark)}
header{background:var(--red);color:#fff;padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 12px rgba(192,57,43,0.4)}
.logo{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:900}
.logo span{color:var(--gold2)}
.stats-bar{display:flex;gap:0.7rem;font-size:0.75rem;font-weight:500}
.stat{background:rgba(255,255,255,0.15);padding:0.3rem 0.7rem;border-radius:20px;display:flex;align-items:center;gap:0.3rem}
.stat-num{font-weight:700;font-size:0.9rem}
.at-stripe{height:4px;background:linear-gradient(90deg,var(--red) 0%,var(--white) 50%,var(--red) 100%)}
nav{background:var(--dark);display:flex;overflow-x:auto}
nav button{flex:1;min-width:80px;padding:0.7rem 0.5rem;background:none;border:none;color:#aaa;font-family:'DM Sans',sans-serif;font-size:0.75rem;font-weight:500;cursor:pointer;transition:all 0.2s;border-bottom:2px solid transparent;white-space:nowrap}
nav button.active{color:var(--gold2);border-bottom-color:var(--gold2)}
nav button:hover{color:#fff}
main{padding:1.2rem;max-width:600px;margin:0 auto}
.cat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:0.8rem;margin-bottom:1.2rem}
.cat-btn{background:#fff;border:2px solid transparent;border-radius:12px;padding:0.9rem 0.7rem;cursor:pointer;text-align:left;transition:all 0.2s;box-shadow:0 2px 8px rgba(0,0,0,0.07)}
.cat-btn:hover{border-color:var(--red);transform:translateY(-2px)}
.cat-btn.active{border-color:var(--red);background:#fff5f5}
.cat-icon{font-size:1.6rem;margin-bottom:0.3rem}
.cat-name{font-size:0.8rem;font-weight:600;color:var(--dark)}
.cat-count{font-size:0.68rem;color:#888;margin-top:0.1rem}
.level-row{display:flex;gap:0.5rem;margin-bottom:1.2rem;flex-wrap:wrap}
.lvl-btn{padding:0.3rem 0.8rem;border-radius:20px;border:1.5px solid #ddd;background:#fff;font-size:0.72rem;font-weight:600;cursor:pointer;transition:all 0.2s}
.lvl-btn.active{background:var(--dark);color:#fff;border-color:var(--dark)}
.card-area{display:flex;flex-direction:column;align-items:center;gap:1rem}
.card-counter{font-size:0.75rem;color:#888;font-weight:500}
.flashcard-wrap{width:100%;perspective:1200px}
.flashcard{width:100%;min-height:220px;position:relative;transform-style:preserve-3d;transition:transform 0.55s cubic-bezier(.4,0,.2,1);cursor:pointer;border-radius:20px}
.flashcard.flipped{transform:rotateY(180deg)}
.card-face{position:absolute;inset:0;border-radius:20px;backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem;box-shadow:var(--shadow)}
.card-front{background:linear-gradient(135deg,var(--red) 0%,#8e1a0e 100%);color:#fff}
.card-back{background:linear-gradient(135deg,#1a1208 0%,#3d2b1a 100%);color:#fff;transform:rotateY(180deg)}
.card-label{font-size:0.65rem;font-weight:600;letter-spacing:0.2em;opacity:0.6;margin-bottom:0.5rem;text-transform:uppercase}
.card-pl{font-size:1.5rem;font-family:'Playfair Display',serif;font-weight:700;text-align:center;margin-bottom:0.3rem}
.card-level{font-size:0.65rem;background:rgba(255,255,255,0.2);padding:0.2rem 0.6rem;border-radius:10px;margin-top:0.5rem}
.card-hint{font-size:0.72rem;opacity:0.6;margin-top:0.8rem}
.compare{width:100%;display:grid;grid-template-columns:1fr 1fr;gap:0.8rem}
.compare-box{border-radius:14px;padding:1rem;text-align:center}
.at-box{background:linear-gradient(135deg,#c0392b,#96281b)}
.de-box{background:linear-gradient(135deg,#2c3e50,#1a252f)}
.flag{font-size:1.4rem;margin-bottom:0.3rem}
.compare-label{font-size:0.6rem;letter-spacing:0.15em;color:rgba(255,255,255,0.6);text-transform:uppercase}
.compare-word{font-size:1.2rem;font-family:'Playfair Display',serif;font-weight:700;color:#fff;margin:0.3rem 0}
.compare-phonetic{font-size:0.7rem;color:rgba(255,255,255,0.55);font-style:italic}
.speak-btn{background:rgba(255,255,255,0.15);border:none;border-radius:8px;padding:0.3rem 0.7rem;color:#fff;font-size:0.7rem;cursor:pointer;margin-top:0.4rem;transition:background 0.2s}
.speak-btn:hover{background:rgba(255,255,255,0.3)}
.card-actions{display:flex;gap:0.7rem;width:100%}
.btn{flex:1;padding:0.7rem;border:none;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:0.8rem;font-weight:600;cursor:pointer;transition:all 0.2s}
.btn-wrong{background:#fde8e6;color:var(--red2)}
.btn-wrong:hover{background:#fbd0cc}
.btn-skip{background:#f0ede6;color:#888}
.btn-correct{background:#e8f8ee;color:var(--green)}
.btn-correct:hover{background:#d0f0de}
.progress-section{margin-bottom:1.5rem}
.progress-title{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;margin-bottom:0.8rem;color:var(--dark)}
.progress-bar-wrap{background:#e8e4dc;border-radius:10px;height:10px;margin-bottom:0.3rem;overflow:hidden}
.progress-bar{height:100%;border-radius:10px;background:linear-gradient(90deg,var(--red),var(--gold));transition:width 0.5s ease}
.progress-row{display:flex;justify-content:space-between;font-size:0.72rem;color:#888;margin-bottom:1rem}
.achievement{background:#fff;border-radius:12px;padding:0.8rem 1rem;display:flex;align-items:center;gap:0.8rem;margin-bottom:0.6rem;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.ach-icon{font-size:1.5rem}
.ach-name{font-size:0.8rem;font-weight:600}
.ach-desc{font-size:0.68rem;color:#888}
.flip-hint{font-size:0.68rem;color:#aaa;text-align:center}
.page{display:none}
.page.active{display:block}
.add-form{background:#fff;border-radius:16px;padding:1.2rem;box-shadow:0 2px 12px rgba(0,0,0,0.08);margin-bottom:1rem}
.add-form label{font-size:0.72rem;font-weight:600;color:#666;display:block;margin-bottom:0.3rem;text-transform:uppercase;letter-spacing:0.08em}
.add-form input,.add-form select{width:100%;padding:0.65rem 0.9rem;border:1.5px solid #e0dbd2;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:0.85rem;color:var(--dark);background:#faf9f6;margin-bottom:0.9rem;outline:none;transition:border-color 0.2s}
.add-form input:focus,.add-form select:focus{border-color:var(--red)}
.btn-add{width:100%;padding:0.8rem;background:var(--red);color:#fff;border:none;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:0.9rem;font-weight:700;cursor:pointer;transition:background 0.2s}
.btn-add:hover{background:var(--red2)}
.added-list{margin-top:1.2rem}
.added-item{background:#fff;border-radius:10px;padding:0.7rem 1rem;display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem;box-shadow:0 1px 6px rgba(0,0,0,0.06);font-size:0.78rem}
.added-item-words{display:flex;flex-direction:column;gap:0.15rem}
.added-item-pl{font-weight:700;color:var(--dark)}
.added-item-at{color:var(--red);font-size:0.72rem}
.del-btn{background:none;border:none;cursor:pointer;font-size:1rem;color:#ccc;padding:0.2rem}
.del-btn:hover{color:var(--red2)}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:var(--dark);color:#fff;padding:0.6rem 1.2rem;border-radius:20px;font-size:0.78rem;font-weight:600;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="at-stripe"></div>
<header>
  <div class="logo">Öster<span>reich</span> Lernen</div>
  <div class="stats-bar">
    <div class="stat">🎯 <span class="stat-num" id="h-correct">0</span></div>
    <div class="stat">🔥 <span class="stat-num" id="h-streak">0</span></div>
    <div class="stat">📚 <span class="stat-num" id="h-total">0</span></div>
  </div>
</header>
<nav>
  <button class="active" onclick="showPage('learn')">🃏 Fiszki</button>
  <button onclick="showPage('compare')">🔄 AT vs DE</button>
  <button onclick="showPage('cats')">📂 Kategorie</button>
  <button onclick="showPage('progress')">📊 Postęp</button>
  <button onclick="showPage('add')">➕ Dodaj</button>
</nav>

<div id="page-learn" class="page active">
<main>
  <div class="level-row">
    <button class="lvl-btn active" onclick="setLevel('all',this)">Wszystkie</button>
    <button class="lvl-btn" onclick="setLevel('A1',this)">A1</button>
    <button class="lvl-btn" onclick="setLevel('A2',this)">A2</button>
    <button class="lvl-btn" onclick="setLevel('B1',this)">B1</button>
    <button class="lvl-btn" onclick="setLevel('B2',this)">B2</button>
  </div>
  <div class="card-area">
    <div class="card-counter" id="card-counter">Karta 1 / 1</div>
    <div class="flashcard-wrap">
      <div class="flashcard" id="flashcard" onclick="flipCard()">
        <div class="card-face card-front">
          <div class="card-label">Po polsku</div>
          <div class="card-pl" id="cf-pl">–</div>
          <div class="card-level" id="cf-level">A1</div>
          <div class="card-hint">kliknij aby odwrócić</div>
        </div>
