<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QUANTI</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --cyan: #00f5ff;
      --deep: #000408;
      --mid: #010d14;
      --glow: 0 0 40px #00f5ff55, 0 0 80px #00f5ff22;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--deep);
      overflow: hidden;
      cursor: none;
    }

    /* Custom cursor */
    #cursor {
      position: fixed;
      width: 6px; height: 6px;
      background: var(--cyan);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 10px var(--cyan), 0 0 20px var(--cyan);
      transition: transform 0.05s;
    }
    #cursor-ring {
      position: fixed;
      width: 32px; height: 32px;
      border: 1px solid #00f5ff44;
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      transition: transform 0.12s ease, width 0.2s, height 0.2s;
    }

    canvas#grid {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      opacity: 0.18;
    }

    /* Scanlines */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.08) 2px,
        rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    /* Vignette */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 40%, #000 100%);
      pointer-events: none;
      z-index: 99;
    }

    #scene {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 10;
    }

    /* Glitch text */
    .quanti {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: clamp(4rem, 16vw, 12rem);
      color: #fff;
      letter-spacing: 0.15em;
      position: relative;
      animation: fadeIn 1.2s ease forwards;
      opacity: 0;
    }

    .quanti::before,
    .quanti::after {
      content: 'QUANTI';
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }
    .quanti::before {
      color: var(--cyan);
      clip-path: polygon(0 0, 100% 0, 100% 35%, 0 35%);
      transform: translateX(-3px);
      animation: glitch1 4s infinite steps(1);
      opacity: 0.7;
    }
    .quanti::after {
      color: #ff003c;
      clip-path: polygon(0 65%, 100% 65%, 100% 100%, 0 100%);
      transform: translateX(3px);
      animation: glitch2 4s infinite steps(1);
      opacity: 0.5;
    }

    @keyframes glitch1 {
      0%, 90%, 100% { transform: translateX(-3px); opacity: 0.7; }
      91% { transform: translateX(6px) skewX(2deg); opacity: 1; clip-path: polygon(0 20%, 100% 20%, 100% 50%, 0 50%); }
      93% { transform: translateX(-4px); }
      95% { transform: translateX(0); opacity: 0; }
    }
    @keyframes glitch2 {
      0%, 88%, 100% { transform: translateX(3px); opacity: 0.5; }
      89% { transform: translateX(-6px) skewX(-3deg); opacity: 1; clip-path: polygon(0 50%, 100% 50%, 100% 80%, 0 80%); }
      92% { transform: translateX(4px); }
      94% { transform: translateX(0); opacity: 0; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.96) translateY(10px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* Glow line under */
    .line {
      width: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--cyan), transparent);
      margin-top: 1.5rem;
      animation: expandLine 1.5s 0.8s ease forwards;
      box-shadow: var(--glow);
    }
    @keyframes expandLine {
      to { width: clamp(200px, 40vw, 500px); }
    }

    /* Sub text */
    .sub {
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(0.6rem, 1.5vw, 0.85rem);
      color: #00f5ff66;
      letter-spacing: 0.5em;
      margin-top: 1.2rem;
      opacity: 0;
      animation: fadeIn 1s 1.5s forwards;
      text-transform: uppercase;
    }

    /* Corner decorations */
    .corner {
      position: fixed;
      width: 40px; height: 40px;
      opacity: 0.4;
    }
    .corner::before, .corner::after {
      content: '';
      position: absolute;
      background: var(--cyan);
    }
    .corner::before { width: 100%; height: 1px; }
    .corner::after { width: 1px; height: 100%; }
    .tl { top: 24px; left: 24px; }
    .tr { top: 24px; right: 24px; transform: scaleX(-1); }
    .bl { bottom: 24px; left: 24px; transform: scaleY(-1); }
    .br { bottom: 24px; right: 24px; transform: scale(-1); }

    /* Particle dots */
    .particle {
      position: fixed;
      width: 2px; height: 2px;
      background: var(--cyan);
      border-radius: 50%;
      animation: float linear infinite;
      opacity: 0;
    }
    @keyframes float {
      0% { transform: translateY(100vh) translateX(0); opacity: 0; }
      10% { opacity: 0.6; }
      90% { opacity: 0.3; }
      100% { transform: translateY(-10vh) translateX(40px); opacity: 0; }
    }
  </style>
</head>
<body>

<div id="cursor"></div>
<div id="cursor-ring"></div>

<canvas id="grid"></canvas>

<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<div id="scene">
  <div class="quanti">QUANTI</div>
  <div class="line"></div>
  <div class="sub">// quantum identity established</div>
</div>

<script>
  // Cursor
  const cursor = document.getElementById('cursor');
  const ring = document.getElementById('cursor-ring');
  let mx = 0, my = 0, rx = 0, ry = 0;
  document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
  (function animCursor() {
    cursor.style.left = mx + 'px';
    cursor.style.top = my + 'px';
    rx += (mx - rx) * 0.15;
    ry += (my - ry) * 0.15;
    ring.style.left = rx + 'px';
    ring.style.top = ry + 'px';
    requestAnimationFrame(animCursor);
  })();

  // Grid canvas
  const canvas = document.getElementById('grid');
  const ctx = canvas.getContext('2d');
  function drawGrid() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    ctx.strokeStyle = '#00f5ff';
    ctx.lineWidth = 0.5;
    const sz = 60;
    for (let x = 0; x < canvas.width; x += sz) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
    }
    for (let y = 0; y < canvas.height; y += sz) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
    }
    // Perspective fade from center
    const grd = ctx.createRadialGradient(
      canvas.width/2, canvas.height/2, 0,
      canvas.width/2, canvas.height/2, canvas.width * 0.7
    );
    grd.addColorStop(0, 'rgba(0,4,8,0)');
    grd.addColorStop(1, 'rgba(0,4,8,0.95)');
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }
  drawGrid();
  window.addEventListener('resize', drawGrid);

  // Particles
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.animationDuration = (8 + Math.random() * 14) + 's';
    p.style.animationDelay = (Math.random() * 12) + 's';
    p.style.boxShadow = '0 0 4px #00f5ff';
    document.body.appendChild(p);
  }
</script>
</body>
</html>
