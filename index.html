<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nauka austriackiego niemieckiego</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --red:#c0392b;--red2:#e74c3c;--cream:#f0ede6;--white:#faf9f6;
  --dark:#1a1208;--gold:#c9972a;--gold2:#f0c040;--green:#27ae60;
  --shadow:0 8px 32px rgba(0,0,0,0.18);
  --bg:var(--cream);--surface:#fff;--surface2:#faf9f6;--border:#e0dbd2;
  --text:#1a1208;--text2:#888;--nav-bg:#1a1208;--input-bg:#faf9f6;
}
[data-theme="dark"]{
  --bg:#0f0d0a;--surface:#1e1a14;--surface2:#2a2318;--border:#3a3020;
  --text:#f0ede6;--text2:#9a8f7f;--nav-bg:#0a0806;--input-bg:#2a2318;
}
html,body{min-height:100vh;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);transition:background 0.3s,color 0.3s}

#welcome-screen{position:fixed;inset:0;z-index:1000;background:linear-gradient(160deg,#1a0a06 0%,#3d1a10 40%,#1a0a06 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center;animation:fadeInW 0.5s ease}
@keyframes fadeInW{from{opacity:0}to{opacity:1}}
#welcome-screen.hide{animation:fadeOutW 0.5s ease forwards}
@keyframes fadeOutW{from{opacity:1;transform:scale(1)}to{opacity:0;transform:scale(1.04)}}
.welcome-flag{font-size:4rem;margin-bottom:0.5rem;animation:bounceIn 0.8s cubic-bezier(.36,.07,.19,.97)}
@keyframes bounceIn{0%{transform:scale(0.3);opacity:0}60%{transform:scale(1.1)}80%{transform:scale(0.95)}100%{transform:scale(1);opacity:1}}
.welcome-title{font-family:'Playfair Display',serif;font-size:2.2rem;font-weight:900;color:#fff;line-height:1.1;margin-bottom:0.4rem}
.welcome-title span{color:var(--gold2)}
.welcome-tagline{font-size:0.88rem;color:rgba(255,255,255,0.6);margin-bottom:1.8rem;max-width:300px;line-height:1.6}
.welcome-stats{display:flex;gap:1.5rem;margin-bottom:1.8rem}
.ws-num{font-size:1.6rem;font-weight:700;color:var(--gold2)}
.ws-lbl{font-size:0.63rem;color:rgba(255,255,255,0.45);text-transform:uppercase;letter-spacing:0.1em}
.welcome-features{display:flex;flex-direction:column;gap:0.55rem;margin-bottom:1.8rem;width:100%;max-width:300px}
.wf{display:flex;align-items:center;gap:0.8rem;background:rgba(255,255,255,0.07);border-radius:12px;padding:0.65rem 0.9rem;text-align:left}
.wf-icon{font-size:1.1rem}
.wf-text{font-size:0.78rem;color:rgba(255,255,255,0.78)}
.welcome-btn{background:var(--red);color:#fff;border:none;border-radius:14px;padding:0.9rem 2.2rem;font-family:'DM Sans',sans-serif;font-size:0.95rem;font-weight:700;cursor:pointer;transition:all 0.2s;box-shadow:0 4px 20px rgba(192,57,43,0.5)}
.welcome-btn:hover{background:var(--red2);transform:translateY(-2px)}

header{background:var(--red);color:#fff;padding:0.85rem 1.2rem;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 12px rgba(192,57,43,0.4);position:sticky;top:0;z-index:100}
.logo{font-family:'Playfair Display',serif;font-size:1.25rem;font-weight:900;cursor:pointer}
.logo span{color:var(--gold2)}
.save-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#4ade80;margin-left:5px;vertical-align:middle;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.header-right{display:flex;align-items:center;gap:0.5rem}
.stats-bar{display:flex;gap:0.4rem}
.stat{background:rgba(255,255,255,0.15);padding:0.22rem 0.55rem;border-radius:20px;display:flex;align-items:center;gap:0.25rem;font-size:0.72rem;font-weight:500}
.stat-num{font-weight:700;font-size:0.82rem}
.dark-btn{background:rgba(255,255,255,0.15);border:none;border-radius:20px;padding:0.22rem 0.6rem;color:#fff;font-size:0.82rem;cursor:pointer;transition:background 0.2s}
.dark-btn:hover{background:rgba(255,255,255,0.28)}
.at-stripe{height:3px;background:linear-gradient(90deg,var(--red) 0%,#fff 50%,var(--red) 100%)}

nav{background:var(--nav-bg);display:flex;overflow-x:auto;scrollbar-width:none;position:sticky;top:55px;z-index:99}
nav::-webkit-scrollbar{display:none}
nav button{flex:1;min-width:66px;padding:0.58rem 0.3rem;background:none;border:none;color:#888;font-family:'DM Sans',sans-serif;font-size:0.67rem;font-weight:500;cursor:pointer;transition:all 0.2s;border-bottom:2px solid transparent;white-space:nowrap}
nav button.active{color:var(--gold2);border-bottom-color:var(--gold2)}
nav button:hover{color:#fff}

main{padding:1.1rem;max-width:600px;margin:0 auto}
.page{display:none;animation:fadeP 0.22s ease}
.page.active{display:block}
@keyframes fadeP{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

.card-area{display:flex;flex-direction:column;align-items:center;gap:1rem}
.card-counter{font-size:0.7rem;color:var(--text2);font-weight:500}
.flashcard-wrap{width:100%;perspective:1200px}
.flashcard{width:100%;min-height:228px;position:relative;transform-style:preserve-3d;transition:transform 0.5s cubic-bezier(.4,0,.2,1);cursor:pointer;border-radius:22px}
.flashcard.flipped{transform:rotateY(180deg)}
.card-face{position:absolute;inset:0;border-radius:22px;backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem;box-shadow:var(--shadow)}
.card-front{background:linear-gradient(135deg,#c0392b 0%,#7d1a0e 100%);color:#fff}
.card-back{background:linear-gradient(135deg,#1a1208 0%,#3d2b1a 100%);color:#fff;transform:rotateY(180deg)}
.card-label{font-size:0.6rem;font-weight:600;letter-spacing:0.2em;opacity:0.55;margin-bottom:0.4rem;text-transform:uppercase}
.card-pl{font-size:1.5rem;font-family:'Playfair Display',serif;font-weight:700;text-align:center;line-height:1.2}
.card-en{font-size:0.73rem;color:rgba(255,255,255,0.42);margin-top:0.35rem;font-style:italic}
.card-level{font-size:0.6rem;background:rgba(255,255,255,0.18);padding:0.18rem 0.55rem;border-radius:10px;margin-top:0.6rem}
.card-hint{font-size:0.67rem;opacity:0.55;margin-top:0.8rem;text-align:center;padding:0 0.5rem}
.sr-badge{position:absolute;top:0.75rem;right:0.75rem;font-size:0.57rem;padding:0.17rem 0.48rem;border-radius:10px;font-weight:700;letter-spacing:0.04em}
.sr-new{background:rgba(41,128,185,0.3);color:#7fb3d3}
.sr-known{background:rgba(39,174,96,0.3);color:#82e0aa}
.card-actions{display:flex;gap:0.6rem;width:100%}
.btn{flex:1;padding:0.62rem;border:none;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:0.75rem;font-weight:600;cursor:pointer;transition:all 0.2s}
.btn-wrong{background:#fde8e6;color:var(--red2)}
.btn-correct{background:#e8f8ee;color:var(--green)}
.btn-skip{background:var(--surface2);color:var(--text2);border:1.5px solid var(--border)}

.quiz-q-box{background:var(--surface);border-radius:20px;padding:1.4rem;text-align:center;box-shadow:var(--shadow);margin-bottom:1rem}
.quiz-q-word{font-size:1.5rem;font-family:'Playfair Display',serif;font-weight:700;color:var(--text)}
.quiz-opts{display:grid;grid-template-columns:1fr 1fr;gap:0.55rem}
.quiz-opt{padding:0.72rem 0.5rem;border:2px solid var(--border);border-radius:12px;background:var(--surface);font-size:0.78rem;cursor:pointer;transition:all 0.2s}
.quiz-opt.correct{border-color:var(--green);background:#e8f8ee;color:var(--green)}
.quiz-opt.wrong{border-color:var(--red2);background:#fde8e6;color:var(--red2)}

.typing-card{background:var(--surface);border-radius:20px;padding:1.4rem;box-shadow:var(--shadow);text-align:center}
.typing-inp{width:100%;padding:0.78rem;border:2px solid var(--border);border-radius:12px;margin-top:1rem;text-align:center;outline:none}

.compare{display:grid;grid-template-columns:1fr 1fr;gap:0.7rem}
.cmp-box{border-radius:14px;padding:0.9rem;text-align:center;color:#fff}
.at-box{background:linear-gradient(135deg,#c0392b,#96281b)}
.de-box{background:linear-gradient(135deg,#2c3e50,#1a252f)}
.speak-btn{background:rgba(255,255,255,0.14);border:none;border-radius:8px;padding:0.3rem 0.6rem;color:#fff;cursor:pointer;margin-top:0.5rem}

.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.7rem}
.cat-btn{background:var(--surface);border:2px solid transparent;border-radius:14px;padding:0.85rem;cursor:pointer;text-align:left;box-shadow:0 2px 8px rgba(0,0,0,0.07)}
.cat-btn.active{border-color:var(--red)}
.toast{position:fixed;bottom:1.4rem;left:50%;transform:translateX(-50%);background:var(--dark);color:#fff;padding:0.52rem 1.1rem;border-radius:20px;font-size:0.74rem;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:9999}
.toast.show{opacity:1}
</style>
</head>
<body>

<div id="welcome-screen">
  <div class="welcome-flag">🇦🇹</div>
  <div class="welcome-title">Öster<span>reich</span><br>Lernen</div>
  <div class="welcome-tagline">Nauka austriackiego niemieckiego – prosto i przyjemnie.</div>
  <div class="welcome-stats">
    <div><div class="ws-num" id="w-count">0</div><div class="ws-lbl">Słów</div></div>
    <div><div class="ws-num">4</div><div class="ws-lbl">Tryby</div></div>
  </div>
  <button class="welcome-btn" onclick="startApp()">Zacznij naukę →</button>
</div>

<div id="app" style="display:none">
<div class="at-stripe"></div>
<header>
  <div class="logo" onclick="showPage('learn')">Öster<span>reich</span> Lernen<span class="save-dot"></span></div>
  <div class="header-right">
    <div class="stats-bar">
      <div class="stat">🎯<span class="stat-num" id="h-correct">0</span></div>
      <div class="stat">🔥<span class="stat-num" id="h-streak">0</span></div>
    </div>
    <button class="dark-btn" id="dark-toggle" onclick="toggleDark()">🌙</button>
  </div>
</header>
<nav>
  <button class="active" data-page="learn" onclick="showPage('learn')">🃏 Fiszkoteka</button>
  <button data-page="quiz" onclick="showPage('quiz')">🧠 Quiz</button>
  <button data-page="typing" onclick="showPage('typing')">⌨️ Pisanie</button>
  <button data-page="compare" onclick="showPage('compare')">🔄 AT vs DE</button>
  <button data-page="cats" onclick="showPage('cats')">📂 Kategorie</button>
  <button data-page="progress" onclick="showPage('progress')">📊 Postęp</button>
</nav>

<div id="page-learn" class="page active"><main>
  <div class="card-area">
    <div class="card-counter" id="card-counter">Karta 1 / 1</div>
    <div class="flashcard-wrap">
      <div class="flashcard" id="flashcard" onclick="flipCard()">
        <div class="card-face card-front">
          <span class="sr-badge sr-new" id="sr-badge">NOWE</span>
          <div class="card-pl" id="cf-pl">–</div>
          <div class="card-en" id="cf-en"></div>
          <div class="card-level" id="cf-level">A1</div>
        </div>
        <div class="card-face card-back">
          <div class="card-pl" id="cb-at">–</div>
          <div class="card-hint" id="cb-hint">–</div>
        </div>
      </div>
    </div>
    <div class="card-actions">
      <button class="btn btn-wrong" onclick="rateCard(1)">✗ Trudne</button>
      <button class="btn btn-skip" onclick="nextCard()">→ Dalej</button>
      <button class="btn btn-correct" onclick="rateCard(5)">✓ Znam!</button>
    </div>
  </div>
</main></div>

<div id="page-quiz" class="page"><main><div id="quiz-container"></div></main></div>
<div id="page-typing" class="page"><main><div id="typing-container"></div></main></div>
<div id="page-compare" class="page"><main><div id="compare-list"></div></main></div>
<div id="page-cats" class="page"><main><div class="cat-grid" id="cat-grid"></div></main></div>
<div id="page-progress" class="page"><main>
    <h2 style="margin-bottom:1rem">Twój postęp</h2>
    <div id="prog-stats" style="background:var(--surface); padding:1rem; border-radius:15px; box-shadow:var(--shadow);color:var(--text)">
        <p id="prog-text">0 / 0 słów nauczonych</p>
    </div>
</main></div>

</div>
<div class="toast" id="toast"></div>

<script>
const WORDS=[
  {pl:"cześć / pa",en:"hi / bye",at:"Servus",de:"Hallo / Tschüss",cat:"powitania",level:"A1",hint:"Typowe pozdrowienie austriackie i bawarskie"},
  {pl:"dzień dobry",en:"good day",at:"Grüß Gott",de:"Guten Tag",cat:"powitania",level:"A1",hint:"Formalne powitanie na południu Niemiec i w Austrii"},
  {pl:"do widzenia",en:"goodbye",at:"Pfiat di",de:"Auf Wiedersehen",cat:"powitania",level:"A1",hint:"Nieformalne, dialekt austriacki"},
  {pl:"buziak",en:"little kiss",at:"Bussi",de:"Küsschen",cat:"powitania",level:"A1"},
  {pl:"wow / ziom",en:"wow / dude",at:"Oida",de:"Alter",cat:"slang",level:"B1",hint:"Austriacki slang, bardzo częste"},
  {pl:"super",en:"awesome",at:"Leiwand",de:"toll",cat:"slang",level:"A2"},
  {pl:"kumpel",en:"buddy",at:"Hawara",de:"Kumpel",cat:"slang",level:"A2"},
  {pl:"kiepski",en:"crappy",at:"gschissn",de:"schlecht",cat:"slang",level:"B1"},
  {pl:"super",en:"cool / great",at:"fett",de:"cool",cat:"slang",level:"B1"},
  {pl:"robotnik",en:"worker",at:"der Hackler",de:"der Arbeiter",cat:"życie",level:"B1"},
  {pl:"przekąska",en:"snack",at:"die Jause",de:"die Brotzeit",cat:"jedzenie",level:"A1"},
  {pl:"ogon wiewiórki",en:"squirrel tail",at:"Oachkatzlschwoaf",de:"Eichhörnchenschwanz",cat:"dialekt",level:"C1",hint:"Kultowe słowo austriackiego dialektu"},
  {pl:"zły humor",en:"bad mood",at:"der Grant",de:"die schlechte Laune",cat:"życie",level:"B1"},
  {pl:"żart / kawał",en:"joke",at:"der Schmäh",de:"der Witz",cat:"życie",level:"B1"},
  {pl:"bawarski",en:"Bavarian",at:"bayerisch",de:"bayerisch",cat:"przymiotniki",level:"A2",hint:"Austria i Bawaria mają podobne dialekty"},
  {pl:"morela",en:"apricot",at:"die Marille",de:"die Aprikose",cat:"jedzenie",level:"A1"},
  {pl:"ziemniak",en:"potato",at:"der Erdapfel",de:"die Kartoffel",cat:"jedzenie",level:"A1",hint:"Dosłownie 'jabłko ziemi'"},
  {pl:"bułka",en:"bread roll",at:"das Semmel",de:"das Brötchen",cat:"jedzenie",level:"A1"},
  {pl:"śmietana",en:"cream",at:"das Obers",de:"die Sahne",cat:"jedzenie",level:"A1"},
  {pl:"pomidor",en:"tomato",at:"der Paradeiser",de:"die Tomate",cat:"jedzenie",level:"A1"}
];

(function initCounter() {
  var el = document.getElementById('w-count');
  if (el) el.textContent = WORDS.length;
})();

const PAGES = ['learn','quiz','typing','compare','cats','progress'];
let stats = JSON.parse(localStorage.getItem('at_stats')) || { correct: 0, streak: 0, learnedWords: [] };
let currentDeck = [];
let currentCardIndex = 0;
let isFlipped = false;

function startApp() {
  document.getElementById('welcome-screen').classList.add('hide');
  setTimeout(() => {
    document.getElementById('welcome-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    initApp();
  }, 500);
}

function initApp() {
  currentDeck = [...WORDS];
  currentCardIndex = Math.floor(Math.random() * currentDeck.length);
  document.getElementById('w-count').textContent = WORDS.length;
  updateStatsUI();
  loadCard();
  renderCategories();
  renderCompare();
}

function showPage(pageId) {
  if (!PAGES.includes(pageId)) return;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  const pageEl = document.getElementById('page-' + pageId);
  const navBtn = document.querySelector('nav button[data-page="' + pageId + '"]');
  if (pageEl) pageEl.classList.add('active');
  if (navBtn) navBtn.classList.add('active');
  if (pageId === 'quiz') loadQuiz();
  if (pageId === 'typing') loadTyping();
  if (pageId === 'progress') updateProgressUI();
}

function loadCard() {
  if (currentDeck.length === 0) {
    document.getElementById('cf-pl').textContent = '(brak kart)';
    document.getElementById('cf-en').textContent = '';
    document.getElementById('cb-at').textContent = '';
    document.getElementById('cb-hint').textContent = 'Wybierz kategorię';
    document.getElementById('cf-level').textContent = '';
    document.getElementById('card-counter').textContent = '0 / 0';
    return;
  }
  const word = currentDeck[currentCardIndex];
  const isKnown = stats.learnedWords.includes(word.pl);
  isFlipped = false;
  document.getElementById('flashcard').classList.remove('flipped');
  document.getElementById('card-counter').textContent = `Karta ${currentCardIndex + 1} / ${currentDeck.length}`;
  document.getElementById('cf-pl').textContent = word.pl;
  document.getElementById('cf-en').textContent = word.en;
  document.getElementById('cb-at').textContent = word.at;
  document.getElementById('cb-hint').textContent = word.hint || word.de;
  document.getElementById('cf-level').textContent = word.level || 'A1';
  const badge = document.getElementById('sr-badge');
  badge.textContent = isKnown ? 'ZNANE' : 'NOWE';
  badge.className = 'sr-badge ' + (isKnown ? 'sr-known' : 'sr-new');
}

function flipCard() {
  if (currentDeck.length === 0) return;
  isFlipped = !isFlipped;
  document.getElementById('flashcard').classList.toggle('flipped', isFlipped);
}

function rateCard(score) {
  if (currentDeck.length === 0) return;
  if (score === 5) {
    stats.correct++;
    stats.streak++;
    const pl = currentDeck[currentCardIndex].pl;
    if (!stats.learnedWords.includes(pl)) stats.learnedWords.push(pl);
  } else {
    stats.streak = 0;
  }
  saveStats();
  updateStatsUI();
  nextCard();
}

function nextCard() {
  if (currentDeck.length === 0) return;
  currentCardIndex = (currentCardIndex + 1) % currentDeck.length;
  loadCard();
}

function loadQuiz() {
  if (WORDS.length < 4) return;
  const word = WORDS[Math.floor(Math.random() * WORDS.length)];
  const opts = [word.at];
  while (opts.length < 4) {
    const r = WORDS[Math.floor(Math.random() * WORDS.length)].at;
    if (!opts.includes(r)) opts.push(r);
  }
  opts.sort(() => Math.random() - 0.5);
  const container = document.getElementById('quiz-container');
  container.innerHTML = '<div class="quiz-q-box"><div class="quiz-q-word">' + escapeHtml(word.pl) + '</div></div>' +
    '<div class="quiz-opts" id="quiz-opts">' +
    opts.map(o => '<button class="quiz-opt" data-answer="' + escapeAttr(o) + '" data-correct="' + escapeAttr(word.at) + '">' + escapeHtml(o) + '</button>').join('') +
    '</div>';
  container.querySelectorAll('.quiz-opt').forEach(btn => {
    btn.onclick = function() { checkQuiz(this); };
  });
}

function escapeHtml(s) { return ('' + s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escapeAttr(s) { return ('' + s).replace(/&/g,'&amp;').replace(/"/g,'&quot;'); }

function checkQuiz(btn) {
  if (btn.classList.contains('correct') || btn.classList.contains('wrong')) return;
  const sel = btn.getAttribute('data-answer');
  const cor = btn.getAttribute('data-correct');
  if (sel === cor) {
    btn.classList.add('correct');
    showToast('Poprawnie!');
    setTimeout(loadQuiz, 1000);
  } else {
    btn.classList.add('wrong');
  }
}

function loadTyping() {
  if (WORDS.length === 0) return;
  const word = WORDS[Math.floor(Math.random() * WORDS.length)];
  const container = document.getElementById('typing-container');
  container.innerHTML = '<div class="typing-card"><h3>' + escapeHtml(word.pl) + '</h3><p style="color:var(--text2);font-size:0.85rem">' + escapeHtml(word.en) + '</p>' +
    '<input type="text" id="t-inp" class="typing-inp" placeholder="Wpisz austriackie słowo...">' +
    '<button class="btn btn-correct" style="margin-top:1rem" onclick="checkTyping(\'' + escapeAttr(normalizeAnswer(word.at)) + '\',\'' + escapeAttr(word.at) + '\')">Sprawdź</button></div>';
  setTimeout(() => document.getElementById('t-inp')?.focus(), 100);
}

function normalizeAnswer(at) {
  return at.replace(/^(der |die |das )/i, '').trim().toLowerCase();
}

function checkTyping(normalizedCorrect, displayAnswer) {
  const inp = document.getElementById('t-inp');
  if (!inp) return;
  const val = inp.value.replace(/^(der |die |das )/i, '').trim().toLowerCase();
  if (val === normalizedCorrect) {
    showToast('Świetnie!');
    loadTyping();
  } else {
    showToast('Spróbuj ponownie: ' + displayAnswer);
  }
}

function renderCompare() {
  const list = document.getElementById('compare-list');
  list.innerHTML = WORDS.map(w => {
    const atSafe = escapeAttr(w.at);
    const deSafe = escapeAttr(w.de);
    return '<div class="compare" style="margin-bottom:1rem">' +
      '<div class="cmp-box at-box">🇦🇹 ' + escapeHtml(w.at) + ' <button class="speak-btn" onclick="speak(\'' + atSafe.replace(/'/g,"\\'") + '\',\'de-AT\')">🔊</button></div>' +
      '<div class="cmp-box de-box">🇩🇪 ' + escapeHtml(w.de) + ' <button class="speak-btn" onclick="speak(\'' + deSafe.replace(/'/g,"\\'") + '\',\'de-DE\')">🔊</button></div>' +
      '</div>';
  }).join('');
}

function speak(text, lang) {
  const u = new SpeechSynthesisUtterance(text);
  u.lang = lang;
  window.speechSynthesis.speak(u);
}

function renderCategories() {
  const cats = [...new Set(WORDS.map(w => w.cat))].sort();
  const grid = document.getElementById('cat-grid');
  grid.innerHTML = cats.map(c => '<button class="cat-btn" onclick="filterCat(\'' + escapeAttr(c) + '\')">' + escapeHtml(c.toUpperCase()) + '</button>').join('');
}

function filterCat(cat) {
  currentDeck = WORDS.filter(w => w.cat === cat);
  currentCardIndex = 0;
  loadCard();
  showPage('learn');
}

function updateProgressUI() {
  const el = document.getElementById('prog-text');
  if (el) el.textContent = stats.learnedWords.length + ' / ' + WORDS.length + ' słów nauczonych';
}

function updateStatsUI() {
  const hc = document.getElementById('h-correct');
  const hs = document.getElementById('h-streak');
  if (hc) hc.textContent = stats.correct;
  if (hs) hs.textContent = stats.streak;
}

function saveStats() {
  localStorage.setItem('at_stats', JSON.stringify(stats));
}

function toggleDark() {
  document.documentElement.toggleAttribute('data-theme');
  const btn = document.getElementById('dark-toggle');
  if (btn) btn.textContent = document.documentElement.hasAttribute('data-theme') ? '☀️' : '🌙';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}
</script>
</body>
</html>
