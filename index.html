<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JS Fiszki — freeCodeCamp</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: rgba(255,255,255,0.08);
      --text: #f0f2f8;
      --text-muted: #8891aa;
      --text-dim: #555e7a;
      --blue: #378ADD;
      --green: #1D9E75;
      --red: #E24B4A;
      --tag-bg: rgba(55,138,221,0.12);
      --tag-text: #85B7EB;
      --radius: 14px;
      --radius-sm: 8px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 4rem;
    }

    .app {
      width: 100%;
      max-width: 540px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .app-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .prog-text {
      font-size: 13px;
      color: var(--text-dim);
    }

    .progress-wrap {
      height: 3px;
      background: var(--surface2);
      border-radius: 2px;
      margin-bottom: 1.5rem;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: var(--blue);
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-bottom: 1.5rem;
    }

    .stat {
      background: var(--surface);
      border-radius: var(--radius-sm);
      padding: 12px;
      text-align: center;
      border: 0.5px solid var(--border);
    }

    .stat-n {
      font-size: 22px;
      font-weight: 500;
    }

    .stat-l {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 2px;
    }

    .scene {
      width: 100%;
      height: 270px;
      perspective: 1000px;
      cursor: pointer;
      margin-bottom: 1.25rem;
    }

    .card {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .card.flipped {
      transform: rotateY(180deg);
    }

    .face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: var(--radius);
      border: 0.5px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    .face.front {
      background: var(--surface);
    }

    .face.back {
      background: var(--surface2);
      transform: rotateY(180deg);
    }

    .face-label {
      font-size: 10px;
      font-weight: 500;
      color: var(--text-dim);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    .face-q {
      font-size: 16px;
      font-weight: 500;
      line-height: 1.6;
      color: var(--text);
      white-space: pre-line;
    }

    .face-a {
      font-size: 14px;
      line-height: 1.8;
      color: var(--text);
      white-space: pre-line;
    }

    .tag {
      margin-top: 14px;
      display: inline-block;
      background: var(--tag-bg);
      color: var(--tag-text);
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 20px;
    }

    .hint {
      text-align: center;
      font-size: 12px;
      color: var(--text-dim);
      margin-bottom: 1.25rem;
    }

    .btns {
      display: flex;
      gap: 10px;
      margin-bottom: 1.25rem;
    }

    .btn {
      flex: 1;
      padding: 11px;
      border-radius: var(--radius-sm);
      border: 0.5px solid var(--border);
      background: transparent;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: background 0.15s;
    }

    .btn.good {
      color: var(--green);
      border-color: rgba(29,158,117,0.4);
    }

    .btn.good:hover {
      background: rgba(29,158,117,0.1);
    }

    .btn.bad {
      color: var(--red);
      border-color: rgba(226,75,74,0.4);
    }

    .btn.bad:hover {
      background: rgba(226,75,74,0.1);
    }

    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .nav-btn {
      padding: 9px 20px;
      border-radius: var(--radius-sm);
      border: 0.5px solid var(--border);
      background: transparent;
      cursor: pointer;
      font-size: 13px;
      color: var(--text-muted);
      transition: background 0.15s;
    }

    .nav-btn:hover {
      background: var(--surface);
    }

    .nav-btn:disabled {
      opacity: 0.25;
      cursor: default;
    }

    .counter {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
    }

    .done {
      text-align: center;
      padding: 3rem 0;
    }

    .done-title {
      font-size: 24px;
      font-weight: 500;
      margin-bottom: 8px;
    }

    .done-sub {
      font-size: 15px;
      color: var(--text-muted);
      margin-bottom: 2rem;
    }

    .restart-btn {
      padding: 11px 28px;
      border-radius: var(--radius-sm);
      border: 0.5px solid var(--border);
      background: transparent;
      cursor: pointer;
      font-size: 14px;
      color: var(--text);
      transition: background 0.15s;
    }

    .restart-btn:hover {
      background: var(--surface);
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <header>
      <div class="app-title">JS Fiszki — freeCodeCamp</div>
      <div class="prog-text" id="prog-text">1 / 18</div>
    </header>

    <div class="progress-wrap">
      <div class="progress-bar" id="prog-bar" style="width: 5.55%"></div>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-n" id="s-total">18</div>
        <div class="stat-l">fiszek</div>
      </div>
      <div class="stat">
        <div class="stat-n" id="s-good" style="color: var(--green)">0</div>
        <div class="stat-l">umiem</div>
      </div>
      <div class="stat">
        <div class="stat-n" id="s-bad" style="color: var(--red)">0</div>
        <div class="stat-l">uczę się</div>
      </div>
    </div>

    <div class="scene" onclick="flipCard()">
      <div class="card" id="card">
        <div class="face front">
          <div class="face-label">pytanie</div>
          <div class="face-q" id="face-q"></div>
          <div class="tag" id="face-tag"></div>
        </div>
        <div class="face back">
          <div class="face-label">odpowiedź</div>
          <div class="face-a" id="face-a"></div>
        </div>
      </div>
    </div>

    <div class="hint" id="hint">kliknij kartę, żeby zobaczyć odpowiedź</div>

    <div class="btns" id="btns" style="display: none">
      <button class="btn bad" onclick="mark(false)">jeszcze uczę się</button>
      <button class="btn good" onclick="mark(true)">umiem to</button>
    </div>

    <div class="nav">
      <button class="nav-btn" id="prev-btn" onclick="go(-1)" disabled>poprzednia</button>
      <div class="counter" id="counter">1</div>
      <button class="nav-btn" id="next-btn" onclick="go(1)">następna</button>
    </div>
  </div>

  <script>
    const cards = [
      { tag: "podstawy", q: "Jaka jest rola JavaScript w porównaniu do HTML i CSS?", a: "JS zapewnia interaktywną funkcjonalność i dynamiczne zachowanie.

HTML = struktura
CSS = style
JS = zachowanie" },
      { tag: "DOM", q: "W jaki sposób JS współdziała z HTML i CSS na stronie?", a: "JS dynamicznie zmienia zawartość i style strony — nie przepisuje HTML od nowa, tylko modyfikuje to co już jest." },
      { tag: "podstawy", q: "Jaka jest relacja między JS, HTML i CSS?", a: "HTML i CSS to języki znaczników.
JavaScript to język programowania — możesz w nim pisać logikę i instrukcje." },
      { tag: "String", q: "Który jest przykładem typu String?
"Hello!"   42   false   null", a: "String to tekst w cudzysłowie: "Hello!"

42 → Number
false → Boolean
null → Null" },
      { tag: "Boolean", q: "Jaki typ danych reprezentuje wartość true albo false?", a: "Boolean — ma tylko dwie wartości:
true lub false

Używasz go np. do warunków w kodzie." },
      { tag: "Undefined", q: "Jeśli zmienna jest zadeklarowana bez wartości — jaki ma typ?", a: "Undefined

let x;      → x jest undefined
let y = 5;  → y to Number" },
      { tag: "let / const", q: "Którego słowa kluczowego użyjesz do deklarowania zmiennej, którą planujesz później aktualizować?", a: "let

let pozwala zmieniać wartość zmiennej.
const — wartość jest stała, nie można jej zmienić." },
      { tag: "nazwy zmiennych", q: "Która jest poprawną nazwą zmiennej?
1stPlace   total-score!   player1Score   const", a: "player1Score — camelCase ✓

1stPlace → nie można zaczynać od cyfry
total-score! → znaki - i ! są niedozwolone
const → to słowo kluczowe JS" },
      { tag: "dobre praktyki", q: "Dlaczego ważne jest stosowanie opisowych nazw zmiennych?", a: "Opisowe nazwy sprawiają, że kod jest łatwiejszy do zrozumienia i utrzymania.

To dobra praktyka — nie wymóg języka." },
      { tag: "const", q: "Co się stanie, jeśli spróbujesz ponownie przypisać wartość do zmiennej zadeklarowanej przez const?", a: "Zostanie zgłoszony błąd — const zmiennych nie można ponownie przypisać.

const x = 5;
x = 10; → TypeError!" },
      { tag: "const", q: "Czy można zadeklarować const zmienną nie przypisując jej wartości?", a: "Nie — const musi być zainicjowana w momencie deklaracji.

const x;       → błąd
const x = 5;   → poprawnie" },
      { tag: "const", q: "Która metoda jest poprawna, aby przypisać liczbę 100 do stałej maxScore?", a: "const maxScore = 100;

=   → przypisanie wartości ✓
==  → porównanie (luźne)
=== → porównanie (ścisłe)
<=  → mniejszy lub równy" },
      { tag: "String", q: "Który zapis tworzy poprawny ciąg znaków?", a: "let name = "Ala";
let name = 'Ala';
let name = `Ala`;

Wszystkie trzy zapisy są poprawne." },
      { tag: "String", q: "Jak sprawdzić liczbę znaków w stringu?", a: "Użyj właściwości length, np. 'Ala'.length.
Zwraca ona liczbę znaków w ciągu." },
      { tag: "String", q: "Jak połączyć dwa stringi w JavaScript?", a: "Możesz użyć operatora +, np. 'Ala' + ' ma kota'.
Działa też template literal: `Ala ma kota`." },
      { tag: "String", q: "Co zwróci wyrażenie "5" + 2?", a: ""52".
W JavaScript liczba zostanie zamieniona na string, bo + przy stringu oznacza konkatenację." },
      { tag: "String", q: "Jakie cudzysłowy możesz używać do tworzenia stringów w JavaScript?", a: "Możesz używać pojedynczych, podwójnych i backticków.
Wszystkie są poprawne, jeśli zapis jest zamknięty poprawnie." },
      { tag: "String", q: "Czy string w JavaScript można zmienić znak po znaku?", a: "Nie bezpośrednio.
Stringi są niemodyfikowalne, więc zwykle tworzysz nowy string zamiast edytować stary." }
    ];

    let idx = 0, flipped = false;
    const results = new Array(cards.length).fill(null);

    function render() {
      const c = cards[idx];
      document.getElementById('face-q').textContent = c.q;
      document.getElementById('face-a').textContent = c.a;
      document.getElementById('face-tag').textContent = c.tag;
      document.getElementById('card').classList.remove('flipped');
      document.getElementById('btns').style.display = 'none';
      document.getElementById('hint').style.display = 'block';
      flipped = false;
      const total = cards.length;
      document.getElementById('prog-text').textContent = (idx + 1) + ' / ' + total;
      document.getElementById('prog-bar').style.width = ((idx + 1) / total * 100) + '%';
      document.getElementById('counter').textContent = idx + 1;
      document.getElementById('prev-btn').disabled = idx === 0;
      document.getElementById('next-btn').disabled = idx === total - 1;
      updateStats();
    }

    function flipCard() {
      if (!flipped) {
        document.getElementById('card').classList.add('flipped');
        document.getElementById('btns').style.display = 'flex';
        document.getElementById('hint').style.display = 'none';
        flipped = true;
      }
    }

    function mark(good) {
      results[idx] = good;
      updateStats();
      if (idx < cards.length - 1) { idx++; render(); }
      else { showDone(); }
    }

    function go(dir) {
      idx = Math.max(0, Math.min(cards.length - 1, idx + dir));
      render();
    }

    function updateStats() {
      document.getElementById('s-good').textContent = results.filter(r => r === true).length;
      document.getElementById('s-bad').textContent = results.filter(r => r === false).length;
    }

    function showDone() {
      const good = results.filter(r => r === true).length;
      document.getElementById('app').innerHTML = `
        <div class="done">
          <div class="done-title">Sesja skończona!</div>
          <div class="done-sub">Umiesz ${good} z ${cards.length} fiszek</div>
          <div class="stats" style="max-width: 320px; margin: 0 auto 2rem;">
            <div class="stat"><div class="stat-n">${cards.length}</div><div class="stat-l">fiszek</div></div>
            <div class="stat"><div class="stat-n" style="color: var(--green)">${good}</div><div class="stat-l">umiem</div></div>
            <div class="stat"><div class="stat-n" style="color: var(--red)">${cards.length - good}</div><div class="stat-l">uczę się</div></div>
          </div>
          <button class="restart-btn" onclick="location.reload()">zacznij od nowa</button>
        </div>`;
    }

    render();
  </script>
</body>
</html>
